<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro component with sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="container">
            <div id="item1" class="itens">
                <h1>Learn to code by watching others</h1>
                <p>See how experienced developers solve problems in real-time. Watching scripted tutorials is great, 
                but understanding how developers think is invaluable.</p>
            </div>
            <div id="item2" class="itens">
                <div id="c1">
                    <p><strong>Try it free 7 days</strong> then $20/mo. thereafter</p>
                </div>
                <div id="c2">
                    <div class="inp">
                        <input type="text" name="inpNome" id="nm" placeholder="Nome" >
                    </div>
                    <div class="inp">
                        <input type="text" name="inpSobNome" id="Snm" placeholder="Sobrenome">
                    </div>
                    <div class="inp">
                        <input type="email" name="inpEmail" id="email" placeholder="Email">
                    </div>
                    <div class="inp">
                        <input type="password" name="inpsenha" id="senha" placeholder="Senha">
                    </div>
                    <button onclick="apertou()" id="btn">
                        CLAIM YOUR FREE TRIAL
                    </button>
                    <div id="term">
                        <p>
                            By clicking the button, you are agreeing to our <strong>Terms and Services </strong>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="javaScript.js"></script>
</body>
</html>
