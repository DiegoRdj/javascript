<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping single column coming soon page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="container">
            <div id="item1" class="itens">
                <img src="ping-coming-soon-page-master/ping-coming-soon-page-master/images/logo.svg" alt="">
            </div>
            <div id="item2" class="itens">
                <h1 style="color: #C3C3C3;">We are launching <strong style="color: black;">soon!</strong></h1>
                <p>Subscribe and get notified</p>
            </div>
            <div id="item3" class="itens">
                <input type="email" name="email" id="imail" placeholder="Your email address... ">
                <button onclick="button()">Notify Me</button> 
                <p id="erro"></p>
            </div>
            <div id="item4" class="itens">
                <img src="ping-coming-soon-page-master/ping-coming-soon-page-master/images/illustration-dashboard.png" alt="">
            </div>
            <div id="item5" class="itens">
                <div id="img1" class="imgs">
                    <img src="facebook_3128304.png" alt="">
                </div>
                <div id="img2" class="imgs">
                    <img src="instagram_1400487.png" alt="">
                </div>
                <div id="img3" class="imgs">
                    <img src="twitter_220233.png" alt="">
                </div>
            </div>
            <div id="item6" class="itens">
                <h1>&copy; Copyright Ping. All rights reserved.</h1>
            </div>
        </div>
    </main>

    <script src="JavaScript.js"></script>
</body>
</html>
