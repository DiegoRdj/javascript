<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div id="container">
            <div class="item" id="item1">
                <img src="interactive-rating-component-main/interactive-rating-component-main/images/icon-star.svg" alt="" id="img">
            </div>
            <div class="item" id="item2">
                <h1>How did we do?</h1>
            </div>
            <div class="item" id="item3">
                <p>Please let us know how we did with your support request. All feedback is appreciated 
                to help us improve our offering!</p>
            </div>
            <div class="item" id="item4">
                <div class="num" onclick="nume(1)">1</div>
                <div class="num" onclick="nume(2)">2</div>
                <div class="num" onclick="nume(3)">3</div>
                <div class="num" onclick="nume(4)">4</div>
                <div class="num" onclick="nume(5)">5</div>
            </div>
            <div class="item" id="item5">
                <button onclick="clicou()">SUBMIT</button>
            </div>
        </div>
    </main>


    <script src="js.js"></script>
</body>
</html>
